    <script>
      // Restore path from GitHub Pages 404 redirect
      (function() {
        var p = window.location.search.match(/[?&]p=([^&]*)/);
        if (p) {
          var path = decodeURIComponent(p[1]);
          window.history.replaceState(
            null, null,
            window.location.pathname.replace(/\/$/, '') + '/' + path
          );
        }
      })();
    </script>
