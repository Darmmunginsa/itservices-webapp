<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>iT Services</title>
  <script>
    // GitHub Pages SPA redirect trick
    // Encode the full path as a query param so index.html can restore it
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 2).join('/') +
      '/?p=' + encodeURIComponent(l.pathname.slice(l.pathname.indexOf('/', 1) + 1) + (l.search ? '&' + l.search.slice(1) : '') + l.hash)
    );
  </script>
</head>
<body></body>
</html>
